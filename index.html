<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

    <!-- ========================================= -->
    <!-- Basic Meta -->
    <!-- ========================================= -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ========================================= -->
    <!-- SEO -->
    <!-- ========================================= -->

    <title>Spix | هر ابزاری، فقط بپرس.</title>

    <meta name="description"
        content="Spix یک دستیار هوشمند برای پیدا کردن ابزارهای آنلاین است. فقط نیازت را بنویس و ابزار مناسب را پیدا کن.">

    <meta name="keywords"
        content="Spix, AI, Online Tools, ابزار آنلاین, هوش مصنوعی">

    <meta name="author" content="Spix Team">

    <meta name="theme-color" content="#0B0B0F">

    <!-- ========================================= -->
    <!-- Fonts -->
    <!-- ========================================= -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Vazirmatn:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- ========================================= -->
    <!-- Favicon -->
    <!-- ========================================= -->

    <link rel="icon" href="favicon.ico">

    <!-- ========================================= -->
    <!-- CSS -->
    <!-- ========================================= -->

    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="assets/css/animations.css">

</head>

<body>

<div id="app">

    <!-- Background Effects -->
    <div class="background">
        <div class="blur blur-1"></div>
        <div class="blur blur-2"></div>
    </div>

    <!-- Header -->
    <header class="header">

        <div class="logo">

            <img src="assets/logo/logo.svg" alt="Spix Logo">

            <span>Spix</span>

        </div>

        <nav class="navigation">

            <a href="#">خانه</a>

            <a href="#">ابزارها</a>

            <a href="#">درباره</a>

        </nav>

    </header>

    <!-- Main -->

    <main class="hero">

        <h1>

            هر ابزاری،
            فقط بپرس.

        </h1>

        <p>

            Spix با کمک هوش مصنوعی،
            سریع‌ترین ابزار مناسب را برای نیازت پیدا می‌کند.

        </p>

        <!-- Chat -->

        <div class="chat-box">

            <input
                   type="text"
                   placeholder="چه ابزاری لازم داری؟">

            <button>

                ارسال

            </button>

        </div>

        <!-- Suggestions -->

        <div class="suggestions">

            <button>📄 PDF</button>

            <button>🖼 عکس</button>

            <button>🎮 بازی</button>

            <button>🔒 رمز</button>

            <button>🎨 رنگ</button>

        </div>

    </main>

</div>

</body>

</html>
